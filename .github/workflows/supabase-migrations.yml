name: Supabase Migrations

on:
  push:
    branches: ["main", "master"]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
  workflow_dispatch:

jobs:
  deploy-migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # secrets are not allowed in job-level `if:`; validate here instead.
      - name: Verify Supabase repository secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          missing=0
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && { echo "::error::Secret SUPABASE_ACCESS_TOKEN is not set"; missing=1; }
          [ -z "$SUPABASE_PROJECT_REF" ] && { echo "::error::Secret SUPABASE_PROJECT_REF is not set"; missing=1; }
          [ -z "$SUPABASE_DB_PASSWORD" ] && { echo "::error::Secret SUPABASE_DB_PASSWORD is not set"; missing=1; }
          exit "$missing"

      - name: Link project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations
        run: supabase db push --linked --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
