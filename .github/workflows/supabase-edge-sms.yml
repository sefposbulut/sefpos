name: Supabase Edge (SMS)

on:
  push:
    branches: ["main", "master"]
    paths:
      - "supabase/functions/send-sms-otp/**"
      - "supabase/functions/verify-sms-otp/**"
      - "supabase/functions/send-sms-welcome/**"
      - "supabase/functions/send-sms-custom/**"
  workflow_dispatch:

jobs:
  deploy-sms-functions:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          missing=0
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && { echo "::error::SUPABASE_ACCESS_TOKEN eksik"; missing=1; }
          [ -z "$SUPABASE_PROJECT_REF" ] && { echo "::error::SUPABASE_PROJECT_REF eksik"; missing=1; }
          exit "$missing"

      - name: Link project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy SMS Edge functions
        run: |
          supabase functions deploy send-sms-otp verify-sms-otp send-sms-welcome send-sms-custom
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
