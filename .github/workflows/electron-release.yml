name: Electron Release (Windows)

# ŞefPOS masaüstü release otomasyonu.
#
# Tetikleme:
#   1) `v*` etiketli (tag) push — örn. `git tag v1.0.5 && git push origin v1.0.5`
#   2) Actions UI'den manuel: "Run workflow"
#
# Yapilan is:
#   - Windows runner: `npm ci` + `vite build` + `electron-builder --win --publish never`
#   - softprops/action-gh-release ile `sefposbulut/sefpos-releases` repo'sundaki
#     Release'e installer + `latest.yml` + `.blockmap` dosyalari yuklenir.
#   - electron-updater bu repo'yu poll ettigi icin kasalarda guncelleme algilanir.
#
# Gerekli GitHub Secret:
#   - `RELEASE_REPO_TOKEN` → `sefposbulut/sefpos-releases` repo'suna
#     **Contents: Read and write** yetkisi olan fine-grained PAT.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without leading v), e.g. 1.0.5"
        required: false
        type: string

jobs:
  windows-release:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Build asamasi: electron-builder publish ETMEZ — sadece release/ klasorune
      # installer + latest.yml + blockmap yazar. Bu sayede build hatalari ile
      # publish hatalari birbirine karismaz, logda hangisi fail oldu netlesir.
      - name: Build Electron Windows installer
        run: |
          npm run build
          npx electron-builder --win --publish never

      - name: List release artifacts
        run: |
          echo "=== release/ icerigi ==="
          dir release
        shell: cmd

      - name: Upload installer as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sefpos-windows-installer
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          if-no-files-found: warn

      # Publish — softprops/action-gh-release sektor standardidir, hata
      # mesajlari net (403/404/422 ayrintilari logda gozukur). electron-builder
      # publish'inin aksine yutmaz. Sadece tag push'larda calisir.
      - name: Publish to sefpos-releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          repository: sefposbulut/sefpos-releases
          token: ${{ secrets.RELEASE_REPO_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
