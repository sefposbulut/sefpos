name: Electron Release (Windows)

# ŞefPOS masaüstü release otomasyonu.
#
# Tetikleme:
#   1) `v*` etiketli (tag) push — örn. `git tag v1.0.2 && git push origin v1.0.2`
#      (En sık kullanılan akış.)
#   2) Actions UI’den manuel: "Run workflow" → version input (örn. 1.0.2)
#      (Workflow `package.json` versionunu set edip commit etmez; sadece
#      o tagi kullanarak build alır.)
#
# Yapılan iş:
#   - Windows runner üzerinde `npm ci` + `vite build` + `electron-builder --win`
#   - electron-builder, `package.json#build.publish` kuralına göre kaynak
#     kod repository’si yerine **sefposbulut/sefpos-releases** repo’sundaki
#     GitHub Release’e binary, `latest.yml`, `*.blockmap` dosyalarını upload eder.
#   - Mevcut release “draft” olarak oluşturulur; içerikler kontrol edildikten
#     sonra Releases sayfasından **Publish release** denmelidir; o aşamada
#     son kullanıcıların kasalarındaki autoUpdater güncellemeyi görür.
#
# Gerekli GitHub Secret:
#   - `RELEASE_REPO_TOKEN` → `sefposbulut/sefpos-releases` reposuna **Contents:
#     write** yetkisi olan bir GitHub fine-grained PAT veya classic PAT
#     (`public_repo` veya `repo` scope).
#
# Diğer mantık (ör. release notes oluşturma) henüz repo otomasyonunda yok;
# Releases sayfasından elle "Release notes" girip Publish'leyince autoUpdater
# o metni kasalarda gösterecek (renderer tarafında ElectronDesktopShell modal).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without leading v), e.g. 1.0.2"
        required: false
        type: string

jobs:
  windows-release:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Vite build sonrası electron-builder Windows installer üretir; build.publish
      # kuralı sayesinde sonuç dosyaları otomatik olarak `sefpos-releases` repo'suna
      # yüklenir (Release draft modunda; manuel Publish gerekir).
      - name: Build Electron Windows installer
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPO_TOKEN }}
        run: |
          npm run build
          npx electron-builder --win --publish always

      # Bilgi amaçlı: çıktıyı job artifact olarak da bırakırız ki release
      # tetiklenmemesi durumunda elle de indirilebilsin.
      - name: Upload installer as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sefpos-windows-installer
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          if-no-files-found: warn
