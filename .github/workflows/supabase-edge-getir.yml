name: Supabase Edge (Getir)

on:
  push:
    branches: ["main", "master"]
    paths:
      - "supabase/functions/getir-api/**"
      - "supabase/functions/getir-webhook/**"
      - "supabase/config.toml"
      - ".github/workflows/supabase-edge-getir.yml"
  workflow_dispatch:

jobs:
  deploy-getir-functions:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          missing=0
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && { echo "::error::SUPABASE_ACCESS_TOKEN eksik"; missing=1; }
          [ -z "$SUPABASE_PROJECT_REF" ] && { echo "::error::SUPABASE_PROJECT_REF eksik"; missing=1; }
          exit "$missing"

      - name: Link project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy getir-api
        # Auth header'i fonksiyon icinde Supabase JWT ile manuel dogruluyoruz.
        # Gateway-level verify_jwt = false (config.toml) → tag bagimsiz deploy.
        run: |
          supabase functions deploy getir-api --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy getir-webhook
        # Public endpoint — x-api-key header ile kendi auth'umuzu yapiyoruz.
        run: |
          supabase functions deploy getir-webhook --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify deployment
        run: |
          echo "Checking deployed functions..."
          curl -s -o /dev/null -w "getir-api: %{http_code}\n" \
            https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/functions/v1/getir-api
          curl -s -o /dev/null -w "getir-webhook: %{http_code}\n" \
            https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/functions/v1/getir-webhook
          echo "(404 = deploy basarisiz, 401/400 = deploy ok)"
