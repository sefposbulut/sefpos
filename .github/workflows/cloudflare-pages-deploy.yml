# www.sefpos.com.tr (Cloudflare Pages) — master'a her push'ta dist + wrangler deploy.
# Electron release'ten bağımsızdır; web arayüzü güncellenmezse bu workflow tetiklenmiyor
# veya aşağıdaki GitHub secret'ları eksiktir.
#
# Gerekli repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — API Token: Account > Cloudflare Pages > Edit (veya Workers Pages deploy)
#   CLOUDFLARE_ACCOUNT_ID  — Dashboard sağ üst profil → "Account ID"
#
# İsteğe bağlı:
#   CLOUDFLARE_PAGES_PROJECT_NAME — Cloudflare Pages proje adı (varsayılan: sefpos, wrangler.toml name ile aynı)
#
# Not: Cloudflare Pages'te ayrıca "Git bağlantısı" ile otomatik build açıksa, aynı projeye
# iki kaynaktan deploy çakışabilir; tek kaynak kullanın (ya CF Git ya da bu workflow).

name: Deploy Cloudflare Pages (web)

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite Pages / CF_PAGES)
        run: npm run build:pages

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME || 'sefpos' }}
