# Cloudflare Pages — Git build (minimal geçerli wrangler).
# https://developers.cloudflare.com/pages/functions/wrangler-configuration
#
# Bu dosyada pages_build_output_dir varsa Functions + wrangler yolu etkin olur;
# Cloudflare hesabinda Build image V2+ olmali (V1'de build sik kirilir):
# https://developers.cloudflare.com/pages/configuration/build-image/
# ZORUNLU (www kökü): Build command = npm run build:pages (CF_PAGES=1 → /assets/, <base href="/">).
# "npm run build" ./ yolları üretir; www.sefpos.com.tr eski arayüzde kalır.
# Dashboard ornek: npm ci && npm run build:pages
# public/_worker.js → dist: Advanced mode; /api/* SPA yerine Supabase Edge proxy.
# Cloudflare → sefposadisyon → Settings → Environment variables (Production):
#   SEFPOS_SUPABASE_URL = https://xdfnozfuuzctubijbnds.supabase.co
# Üretim domain (www.sefpos.com.tr) bu Pages projesine bağlıdır. GitHub Actions
# wrangler pages deploy hedefi varsayılan olarak aynı addır (sefposadisyon).
#
# Eski yinelenen proje "sefpos" (yalnızca sefpos.pages.dev, domain yok) silinmek için
# yerelde bir kez: CLOUDFLARE_API_TOKEN (+ CLOUDFLARE_ACCOUNT_ID) ile
#   npm run cf:pages:delete-legacy-sefpos
# veya Cloudflare Dashboard → Workers & Pages → sefpos → Sil.
#
name = "sefposadisyon"
compatibility_date = "2024-11-01"
pages_build_output_dir = "dist"
